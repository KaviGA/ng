<!DOCTYPE html>
<html>
<head>
<title>Galaxy Assault - Final Edition</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
#ui {
    position:absolute;
    color:white;
    font-family:Arial;
    padding:10px;
}
</style>
</head>
<body>

<div id="ui">
❤️ <span id="health">3</span>  
🎯 <span id="score">0</span>  
💣 <span id="bombs">3</span>  
⚡ <span id="bombType">NUKE</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// PLAYER
let player = {
    x: canvas.width/2,
    y: canvas.height-80,
    speed: 6,
    health: 3
};

let score = 0;
let bombs = 3;
let bombType = "nuke";

// SYSTEMS
let bullets = [];
let enemyBullets = [];
let enemies = [];
let stars = [];
let particles = [];
let targets = [];
let airstrikes = [];
let warningZones = [];

let freezeTimer = 0;

let boss = null;
let bossTimer = 0;

// CONTROLS
let keys = {};

document.addEventListener("keydown", e=>{
    keys[e.key]=true;

    if(e.key==="1") bombType="nuke";
    if(e.key==="2") bombType="emp";
    if(e.key==="3") bombType="freeze";

    if(e.code==="Space" && bombs>0){
        bombs--;
        createTarget(player.x, player.y);
    }
});

document.addEventListener("keyup", e=>keys[e.key]=false);

// MOUSE
document.addEventListener("click",(e)=>{
    bullets.push({x:player.x,y:player.y});
    if(bombs>0){
        bombs--;
        createTarget(e.clientX,e.clientY);
    }
});

// MOBILE
canvas.addEventListener("touchmove",(e)=>{
    player.x = e.touches[0].clientX;
});

canvas.addEventListener("touchstart",(e)=>{
    let t = e.touches[0];
    bullets.push({x:player.x,y:player.y});
    if(bombs>0){
        bombs--;
        createTarget(t.clientX,t.clientY);
    }
});

// STARFIELD
for(let i=0;i<150;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        speed:Math.random()*2+1
    });
}

// ENEMIES
setInterval(()=>{
    enemies.push({
        x:Math.random()*canvas.width,
        y:-20,
        size:15,
        speed:2
    });
},1000);

// TARGET
function createTarget(x,y){
    targets.push({x,y,timer:40});
}

// BOSS SPAWN
function spawnBoss(){
    boss = {
        x: canvas.width/2,
        y: 100,
        health: 200,
        phase: 1
    };
}

// GAME LOOP
function gameLoop(){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // STARS
    ctx.fillStyle="white";
    stars.forEach(s=>{
        s.y+=s.speed;
        if(s.y>canvas.height) s.y=0;
        ctx.fillRect(s.x,s.y,2,2);
    });

    // PLAYER MOVE
    if(keys["ArrowLeft"]) player.x-=player.speed;
    if(keys["ArrowRight"]) player.x+=player.speed;

    // PLAYER DRAW
    ctx.fillStyle="cyan";
    ctx.beginPath();
    ctx.moveTo(player.x,player.y);
    ctx.lineTo(player.x-20,player.y+30);
    ctx.lineTo(player.x+20,player.y+30);
    ctx.fill();

    // BULLETS
    ctx.fillStyle="yellow";
    bullets.forEach((b,i)=>{
        b.y-=8;
        ctx.fillRect(b.x-2,b.y,4,10);
        if(b.y<0) bullets.splice(i,1);
    });

    // ENEMIES
    ctx.fillStyle="red";
    enemies.forEach((e,ei)=>{
        if(e.x<player.x) e.x+=1;
        if(e.x>player.x) e.x-=1;

        let sp = freezeTimer>0 ? 0.5 : e.speed;
        e.y+=sp;

        ctx.beginPath();
        ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
        ctx.fill();

        bullets.forEach((b,bi)=>{
            let dx=e.x-b.x;
            let dy=e.y-b.y;
            if(Math.sqrt(dx*dx+dy*dy)<e.size){
                enemies.splice(ei,1);
                bullets.splice(bi,1);
                score+=10;
            }
        });

        if(e.y>canvas.height){
            enemies.splice(ei,1);
            player.health--;
        }
    });

    // BOSS
    if(score>300 && !boss) spawnBoss();

    if(boss){
        ctx.fillStyle="purple";
        ctx.beginPath();
        ctx.arc(boss.x,boss.y,60,0,Math.PI*2);
        ctx.fill();

        boss.x += Math.sin(Date.now()/500)*2;
        bossTimer++;

        // radial bullets
        if(boss.phase===1 && bossTimer%40===0){
            for(let a=0;a<Math.PI*2;a+=0.4){
                enemyBullets.push({
                    x:boss.x,
                    y:boss.y,
                    dx:Math.cos(a)*3,
                    dy:Math.sin(a)*3
                });
            }
        }

        if(boss.health<100) boss.phase=2;

        // aimed shots
        if(boss.phase===2 && bossTimer%20===0){
            let dx=player.x-boss.x;
            let dy=player.y-boss.y;
            let m=Math.sqrt(dx*dx+dy*dy);

            enemyBullets.push({
                x:boss.x,
                y:boss.y,
                dx:dx/m*5,
                dy:dy/m*5
            });
        }

        enemyBullets.forEach((b,bi)=>{
            b.x+=b.dx;
            b.y+=b.dy;

            ctx.fillStyle="pink";
            ctx.fillRect(b.x,b.y,4,4);

            let dx=b.x-player.x;
            let dy=b.y-player.y;

            if(Math.sqrt(dx*dx+dy*dy)<20){
                player.health--;
                enemyBullets.splice(bi,1);
            }
        });

        bullets.forEach((b,bi)=>{
            let dx=b.x-boss.x;
            let dy=b.y-boss.y;
            if(Math.sqrt(dx*dx+dy*dy)<60){
                boss.health-=2;
                bullets.splice(bi,1);
            }
        });

        if(boss.health<=0){
            score+=500;
            boss=null;
        }
    }

    // TARGETS
    targets.forEach((t,ti)=>{
        t.timer--;

        ctx.strokeStyle="red";
        ctx.beginPath();
        ctx.arc(t.x,t.y,20,0,Math.PI*2);
        ctx.stroke();

        if(t.timer<=0){

            warningZones.push({x:t.x,y:t.y,radius:150,timer:40});

            for(let i=0;i<5;i++){
                airstrikes.push({
                    x:t.x+(Math.random()-0.5)*100,
                    y:-50,
                    targetY:t.y,
                    speed:6
                });
            }

            t.done=true;
        }
    });

    targets = targets.filter(t=>!t.done);

    // WARNING ZONES
    ctx.strokeStyle="red";
    warningZones.forEach((w,wi)=>{
        w.timer--;

        ctx.beginPath();
        ctx.arc(w.x,w.y,w.radius,0,Math.PI*2);
        ctx.stroke();

        enemies.forEach(e=>{
            let dx=e.x-w.x;
            let dy=e.y-w.y;
            let d=Math.sqrt(dx*dx+dy*dy);
            if(d<w.radius){
                e.x+=dx*0.05;
                e.y+=dy*0.05;
            }
        });

        if(w.timer<=0) warningZones.splice(wi,1);
    });

    // AIRSTRIKES
    ctx.fillStyle="white";
    airstrikes.forEach((m,mi)=>{
        m.y+=m.speed;
        ctx.fillRect(m.x,m.y,4,12);

        if(m.y>=m.targetY){

            for(let i=0;i<80;i++){
                particles.push({
                    x:m.x,y:m.y,
                    dx:(Math.random()-0.5)*8,
                    dy:(Math.random()-0.5)*8,
                    life:50
                });
            }

            enemies.forEach((e,ei)=>{
                let dx=e.x-m.x;
                let dy=e.y-m.y;
                if(Math.sqrt(dx*dx+dy*dy)<100){
                    enemies.splice(ei,1);
                    score+=10;
                }
            });

            if(bombType==="emp") freezeTimer=200;
            if(bombType==="freeze") freezeTimer=100;
            if(bombType==="nuke") enemies=[];

            airstrikes.splice(mi,1);
        }
    });

    // PARTICLES
    ctx.fillStyle="orange";
    particles.forEach((p,i)=>{
        p.x+=p.dx;
        p.y+=p.dy;
        p.life--;
        ctx.fillRect(p.x,p.y,3,3);
        if(p.life<=0) particles.splice(i,1);
    });

    if(freezeTimer>0) freezeTimer--;

    // UI
    document.getElementById("health").textContent=player.health;
    document.getElementById("score").textContent=score;
    document.getElementById("bombs").textContent=bombs;
    document.getElementById("bombType").textContent=bombType.toUpperCase();

    // GAME OVER
    if(player.health<=0){
        ctx.fillStyle="white";
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER", canvas.width/2-120, canvas.height/2);
        ctx.fillText("Score: "+score, canvas.width/2-100, canvas.height/2+50);
        return;
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
